name: Build Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/umami-alerts config.sample.toml dist/
          tar czf umami-alerts-${{ matrix.target }}.tar.gz -C dist .
          tar cJf umami-alerts-${{ matrix.target }}.tar.xz -C dist .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/umami-alerts config.sample.toml dist/
          cd dist && zip -r ../umami-alerts-${{ matrix.target }}.zip .

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: umami-alerts-${{ matrix.target }}.*
